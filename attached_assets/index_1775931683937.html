<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Player</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>
<style>
/* ── Variables & Mood Themes ─────────────────────────── */
:root {
  --bg:#080810; --surface:#10101a; --surface2:#18182a; --surface3:#20203a;
  --border:rgba(255,255,255,.06); --border2:rgba(255,255,255,.1);
  --text:#f0f0ff; --text2:#8888aa; --text3:#44445a;
  --mood-accent:#7c6aff; --mood-accent2:#ff6ab0; --mood-glow:rgba(124,106,255,.18);
}
body.mood-calm        { --mood-accent:#6affda; --mood-accent2:#6ab0ff; --mood-glow:rgba(106,255,218,.15); }
body.mood-energetic   { --mood-accent:#ff6ab0; --mood-accent2:#ffb86a; --mood-glow:rgba(255,106,176,.18); }
body.mood-melancholic { --mood-accent:#6a9fff; --mood-accent2:#9b6aff; --mood-glow:rgba(106,159,255,.15); }
body.mood-euphoric    { --mood-accent:#ffda6a; --mood-accent2:#ff9b6a; --mood-glow:rgba(255,218,106,.18); }

/* ── Reset ───────────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

/* ── Ambient Canvas ──────────────────────────────────── */
#ambient-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.55}

/* ── App Grid ────────────────────────────────────────── */
.app{position:relative;z-index:1;display:grid;grid-template-columns:280px 1fr;grid-template-rows:56px 1fr 130px;height:100vh;overflow:hidden}

/* ── Header ──────────────────────────────────────────── */
.header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--border);background:rgba(8,8,16,.9);backdrop-filter:blur(24px);position:relative;z-index:20;gap:8px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;letter-spacing:-.5px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--mood-accent);box-shadow:0 0 10px var(--mood-accent);transition:background .8s,box-shadow .8s;animation:pulse-dot 2.2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.6}}
.logo span{color:var(--mood-accent);transition:color .8s}
.header-center{position:absolute;left:50%;transform:translateX(-50%)}
.mood-chip{display:flex;align-items:center;gap:6px;padding:5px 13px 5px 9px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:20px;font-size:11px;color:var(--text2)}
.mood-icon{font-size:13px}
.mood-label{font-weight:600;color:var(--mood-accent);transition:color .8s;letter-spacing:.3px}
.header-right{display:flex;align-items:center;gap:6px}
.hdr-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:20px;font-size:11.5px;color:var(--text2);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.hdr-btn:hover,.hdr-btn:focus-visible{border-color:var(--mood-accent);color:var(--mood-accent);outline:none}
.hdr-btn svg{width:12px;height:12px;flex-shrink:0}
.hdr-btn.active{background:rgba(124,106,255,.12);border-color:var(--mood-accent);color:var(--mood-accent)}
#playlist-select{font-size:11px;color:var(--text2);padding:5px 9px;border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.04);font-family:'DM Sans',sans-serif}
#playlist-select:hover{border-color:var(--mood-accent);color:var(--mood-accent)}
#file-input{display:none}

/* ── Sidebar ─────────────────────────────────────────── */
.sidebar{border-right:1px solid var(--border);background:rgba(10,10,20,.65);backdrop-filter:blur(16px);display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:10}
.sidebar-header{padding:12px 15px 9px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border)}
.sidebar-title{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--text3);text-transform:uppercase}
.sidebar-meta{display:flex;align-items:center;gap:6px}
.track-count{font-size:11px;background:rgba(124,106,255,.1);color:var(--mood-accent);padding:2px 8px;border-radius:10px;font-weight:600;transition:color .8s,background .8s}
.clear-btn{width:22px;height:22px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:11px;transition:all .2s}
.clear-btn:hover{color:#ff6ab0;border-color:#ff6ab0}
.sidebar-search{padding:8px 12px;flex-shrink:0;border-bottom:1px solid var(--border)}
.search-wrap{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:6px 10px;transition:border-color .2s}
.search-wrap:focus-within{border-color:var(--mood-accent)}
.search-wrap svg{width:12px;height:12px;color:var(--text3);flex-shrink:0}
.search-wrap input{background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);width:100%}
.search-wrap input::placeholder{color:var(--text3)}
#queue-list{flex:1;overflow-y:auto;padding:4px 0}
#queue-list::-webkit-scrollbar{width:3px}
#queue-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.queue-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px 16px;gap:11px;color:var(--text3);text-align:center}
.queue-empty .emp-icon{font-size:26px;opacity:.35}
.queue-empty p{font-size:12px;line-height:1.7}
.queue-empty strong{color:var(--text2)}

/* ── Track Item ──────────────────────────────────────── */
.track-item{display:flex;align-items:center;gap:9px;padding:7px 12px;cursor:pointer;transition:background .15s;position:relative;user-select:none;border-left:3px solid transparent}
.track-item:hover{background:rgba(255,255,255,.03)}
.track-item.active{background:rgba(124,106,255,.08);border-left-color:var(--mood-accent)}
.track-item.drag-over{background:rgba(124,106,255,.12);outline:1px dashed var(--mood-accent)}
.track-item.dragging{opacity:.35}
.track-num{width:16px;text-align:center;font-size:10px;color:var(--text3);flex-shrink:0;font-variant-numeric:tabular-nums}
.track-item.active .track-num{display:none}
.now-eq{display:none;width:16px;flex-shrink:0;align-items:center;justify-content:center;gap:1.5px}
.track-item.active .now-eq{display:flex}
.eq-mini{width:2px;border-radius:1px;background:var(--mood-accent);animation:eq-mini-a .7s ease-in-out infinite alternate;transition:background .8s}
.eq-mini:nth-child(1){height:5px;animation-delay:0s}
.eq-mini:nth-child(2){height:9px;animation-delay:.2s}
.eq-mini:nth-child(3){height:6px;animation-delay:.1s}
.eq-mini.paused{animation-play-state:paused}
@keyframes eq-mini-a{from{transform:scaleY(.3)}to{transform:scaleY(1)}}
.track-thumb{width:36px;height:36px;border-radius:7px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:14px;position:relative}
.track-thumb img{width:100%;height:100%;object-fit:cover}
.track-thumb .hover-play{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;font-size:10px}
.track-item:hover .hover-play{opacity:1}
.track-info{flex:1;min-width:0}
.track-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.track-item.active .track-name{color:var(--mood-accent);transition:color .8s}
.track-sub{font-size:10px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-remove{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:var(--text3);border-radius:4px;opacity:0;transition:opacity .15s,color .15s;flex-shrink:0;cursor:pointer;font-size:12px}
.track-item:hover .track-remove{opacity:1}
.track-remove:hover{color:#ff6ab0}

/* ── Main ────────────────────────────────────────────── */
.main{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 26px;position:relative;overflow:hidden}
.drop-zone{position:absolute;inset:10px;border:2px dashed var(--border2);border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;pointer-events:none;opacity:0;z-index:50;transition:opacity .25s;background:rgba(8,8,16,.75);backdrop-filter:blur(8px)}
.drop-zone.active{opacity:1}
.drop-zone .dz-icon{font-size:40px}
.drop-zone p{font-family:'Syne',sans-serif;font-size:15px;color:var(--mood-accent)}
.player-inner{display:flex;flex-direction:column;align-items:center;width:100%;max-width:400px}

/* Album art + circular vis */
.album-section{position:relative;margin-bottom:18px;display:flex;align-items:center;justify-content:center}
#vis-canvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:1}
.album-art{width:175px;height:175px;border-radius:20px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:46px;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.55),0 0 0 1px var(--border);transition:box-shadow .8s,transform .5s cubic-bezier(.34,1.56,.64,1);z-index:2;flex-shrink:0;cursor:pointer}
.album-art img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.album-art .art-emoji{position:relative;z-index:1}
.vinyl-ring{position:absolute;inset:-13px;border-radius:50%;border:2px solid rgba(124,106,255,.18);animation:spin 8s linear infinite;animation-play-state:paused;pointer-events:none;z-index:3}
.vinyl-ring::before{content:'';position:absolute;inset:11px;border-radius:50%;border:1px solid rgba(124,106,255,.09)}
@keyframes spin{to{transform:rotate(360deg)}}
.album-art.playing{box-shadow:0 28px 76px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.07),0 0 55px var(--mood-glow);animation:art-breathe 4s ease-in-out infinite}
.album-art.playing .vinyl-ring{animation-play-state:running}
@keyframes art-breathe{0%,100%{transform:scale(1) rotate(-.5deg)}50%{transform:scale(1.03) rotate(.5deg)}}

/* Now playing */
.now-playing{text-align:center;margin-bottom:12px;width:100%;position:relative}
.np-label{font-size:9px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;font-weight:600;margin-bottom:6px}
.marquee-wrap{overflow:hidden;width:100%;margin-bottom:3px}
.now-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;line-height:1.2;white-space:nowrap;display:inline-block;background:linear-gradient(135deg,var(--text) 40%,var(--mood-accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;transition:background .8s}
.now-title.marquee{animation:marquee-scroll 9s linear infinite}
@keyframes marquee-scroll{0%,20%{transform:translateX(0)}80%,100%{transform:translateX(calc(-100% + 360px))}}
.now-artist{font-size:12.5px;color:var(--text2)}
.like-btn{position:absolute;right:0;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;padding:5px;border-radius:50%;transition:transform .3s cubic-bezier(.34,1.56,.64,1);color:var(--text3);line-height:1}
.like-btn:hover{transform:translateY(-50%) scale(1.3)}
.like-btn.liked{color:#ff6ab0}

/* Waveform */
.waveform-section{width:100%;margin-bottom:7px;position:relative;cursor:pointer}
#waveform-canvas{width:100%;height:46px;display:block;border-radius:7px;cursor:pointer}
.wf-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);pointer-events:none;opacity:0;transition:opacity .3s}
.wf-loading.show{opacity:1}
.progress-times{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-variant-numeric:tabular-nums;margin-top:3px;padding:0 2px}

/* Controls */
.controls{display:flex;align-items:center;justify-content:center;gap:2px;margin-bottom:11px;width:100%}
.ctrl-btn{background:none;border:none;cursor:pointer;color:var(--text2);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.ctrl-btn:hover{color:var(--text);transform:scale(1.12)}
.ctrl-btn.active{color:var(--mood-accent)}
.ctrl-btn svg{width:17px;height:17px}
.play-btn{width:52px;height:52px;background:linear-gradient(135deg,var(--mood-accent),var(--mood-accent2));border:none;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,background .8s;box-shadow:0 8px 28px var(--mood-glow);margin:0 7px;flex-shrink:0}
.play-btn:hover{transform:scale(1.1);box-shadow:0 14px 36px var(--mood-glow)}
.play-btn:active{transform:scale(.94)}
.play-btn svg{width:20px;height:20px}

/* Volume + speed */
.bottom-controls{display:flex;align-items:center;width:100%;gap:11px}
.vol-group{display:flex;align-items:center;gap:7px;flex:1}
.vol-icon{color:var(--text3);flex-shrink:0}
.vol-icon svg{width:14px;height:14px}
.range-track{flex:1;position:relative;height:3px;background:var(--surface2);border-radius:3px;cursor:pointer}
.range-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--mood-accent),var(--mood-accent2));pointer-events:none;transition:background .8s}
input[type=range]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;margin:0;height:100%;-webkit-appearance:none}
.speed-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:11px;font-weight:600;padding:4px 9px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;flex-shrink:0}
.speed-btn:hover{border-color:var(--mood-accent);color:var(--mood-accent)}

/* ── Bottom Bar ───────────────────────────────────────── */
.bottom-bar{grid-column:1/-1;border-top:1px solid var(--border);background:rgba(8,8,16,.94);backdrop-filter:blur(24px);display:flex;align-items:center;padding:0 20px;gap:16px;position:relative;z-index:10}
.mini-progress{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--mood-accent),var(--mood-accent2));transform-origin:left;transform:scaleX(0);transition:transform .15s linear,background .8s}
.mini-art{width:46px;height:46px;border-radius:9px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;position:relative}
.mini-art img{width:100%;height:100%;object-fit:cover}
.mini-info{flex:1;min-width:0}
.mini-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-artist{font-size:11px;color:var(--text2)}
.key-hint{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:4px;flex-shrink:0}
kbd{padding:2px 5px;background:var(--surface2);border:1px solid var(--border2);border-radius:4px;font-size:9px;font-family:'DM Sans',sans-serif;color:var(--text3)}
.eq-dots{display:flex;align-items:flex-end;gap:2px;height:15px;flex-shrink:0}
.eq-d{width:2.5px;border-radius:1px;background:var(--mood-accent);transition:background .8s;animation:eqdot .7s ease-in-out infinite alternate}
.eq-d:nth-child(1){height:5px;animation-delay:0s}
.eq-d:nth-child(2){height:10px;animation-delay:.15s}
.eq-d:nth-child(3){height:14px;animation-delay:.3s}
.eq-d:nth-child(4){height:7px;animation-delay:.45s}
.eq-d:nth-child(5){height:11px;animation-delay:.6s}
@keyframes eqdot{from{transform:scaleY(.3)}to{transform:scaleY(1)}}
.eq-dots.paused .eq-d{animation-play-state:paused}

/* ── Immersive Overlay ───────────────────────────────── */
.immersive-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .5s}
.immersive-overlay.active{opacity:1;pointer-events:all}
.imm-bg{position:absolute;inset:0;background:var(--bg)}
.imm-blur{position:absolute;inset:-60px;background-size:cover;background-position:center;filter:blur(70px) saturate(1.8) brightness(.22);transition:background-image .8s}
.imm-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 25%,rgba(0,0,0,.72) 100%)}
.imm-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;z-index:2}
.imm-close:hover{background:rgba(255,255,255,.14);color:#fff}
.imm-close svg{width:14px;height:14px}
.imm-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:24px;max-width:440px;width:100%;padding:34px 24px}
.imm-art{width:220px;height:220px;border-radius:20px;overflow:hidden;box-shadow:0 36px 110px rgba(0,0,0,.7);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--surface2);font-size:62px;animation:art-breathe 4s ease-in-out infinite}
.imm-art img{width:100%;height:100%;object-fit:cover}
.imm-info{text-align:center;width:100%}
.imm-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:5px;background:linear-gradient(135deg,#fff,var(--mood-accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.imm-artist{font-size:14px;color:rgba(255,255,255,.42)}
.imm-progress{width:100%}
.imm-bar-wrap{height:4px;background:rgba(255,255,255,.1);border-radius:4px;cursor:pointer;margin-bottom:7px}
.imm-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--mood-accent),var(--mood-accent2));transition:background .8s}
.imm-times{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.32);font-variant-numeric:tabular-nums}
.imm-controls{display:flex;align-items:center;gap:16px}
.imm-ctrl{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.62);cursor:pointer;transition:all .2s}
.imm-ctrl:hover{background:rgba(255,255,255,.15);color:#fff}
.imm-ctrl svg{width:17px;height:17px}
.imm-play-btn{width:62px;height:62px;background:linear-gradient(135deg,var(--mood-accent),var(--mood-accent2));border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;box-shadow:0 10px 32px var(--mood-glow);transition:transform .2s cubic-bezier(.34,1.56,.64,1),background .8s,box-shadow .5s}
.imm-play-btn:hover{transform:scale(1.1)}
.imm-play-btn svg{width:24px;height:24px}

/* ── Toast ───────────────────────────────────────────── */
.toast{position:fixed;bottom:148px;right:18px;width:282px;background:rgba(12,12,24,.97);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:12px;display:flex;align-items:center;gap:11px;box-shadow:0 18px 55px rgba(0,0,0,.5);transform:translateX(320px);transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:300}
.toast.show{transform:translateX(0)}
.toast-art{width:42px;height:42px;border-radius:8px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:17px}
.toast-art img{width:100%;height:100%;object-fit:cover}
.toast-info{flex:1;min-width:0}
.toast-label{font-size:9px;color:var(--mood-accent);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:2px;transition:color .8s}
.toast-title{font-size:12.5px;font-weight:600;font-family:'Syne',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toast-artist{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Mini Mode ───────────────────────────────────────── */
body.mini-mode .app{grid-template-columns:1fr;grid-template-rows:1fr}
body.mini-mode .header,body.mini-mode .sidebar,body.mini-mode .main{display:none!important}
body.mini-mode .bottom-bar{height:100vh;flex-direction:column;justify-content:center;gap:20px;padding:34px}
body.mini-mode .mini-art{width:155px;height:155px;border-radius:18px;font-size:56px}
body.mini-mode .mini-info{text-align:center}
body.mini-mode .mini-title{font-size:19px;font-family:'Syne',sans-serif}
body.mini-mode .key-hint{display:none}

/* ── Responsive ──────────────────────────────────────── */

<body>

<canvas id="ambient-canvas"></canvas>

<div class="app">

  <!-- Header -->

      <div class="logo-dot"></div>
      aura<span>.</span>
    </div>
    <div class="header-center">

    <div class="header-right">

      <button class="hdr-btn" onclick="savePlaylist()" title="Save queue as playlist">

        Save

        Add Music
      </button>
      <button class="hdr-btn" id="imm-btn" onclick="toggleImmersive()" title="Immersive (I)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3M16 3h3a2 2 0 012 2v3M8 21H5a2 2 0 01-2-2v-3M16 21h3a2 2 0 002-2v-3"/></svg>
      </button>
      <button class="hdr-btn" onclick="toggleMini()" title="Mini mode (M)">Mini</button>

  <!-- Sidebar -->

  <!-- Main -->

      <!-- Now playing -->
      <div class="now-playing">

        <div class="marquee-wrap">

      </div>

      <!-- Waveform + times -->

      <!-- Transport controls -->

        </button>
      </div>

      <!-- Volume + speed -->
      <div class="bottom-controls">
        <div class="vol-group">

  <!-- Bottom Bar -->

<script>
(async () => {
'use strict';

/* ── DOM Refs ─────────────────────────────────────────── */
const audio   = document.getElementById('audio');
const ambCv   = document.getElementById('ambient-canvas');
const ambCtx  = ambCv.getContext('2d');
const visCv   = document.getElementById('vis-canvas');
const visCtx  = visCv.getContext('2d');
const wfCv    = document.getElementById('waveform-canvas');
const wfCtx   = wfCv.getContext('2d');

/* ── State ────────────────────────────────────────────── */
let library = [], tracks = [], currentIndex = -1;
let isPlaying = false, shuffle = false, repeat = false;
let immersiveOpen = false, searchQuery = '';
let likedTracks = new Set(JSON.parse(localStorage.getItem('aura:likes') || '[]'));
let speedIdx = 0;
const speeds = [1, 1.25, 1.5, 0.75];

// Audio API
let audioCtx, analyser, gainNode, mediaSrc, dataArray, freqBinCount, audioReady = false;

// Waveform
let waveformData = null, wfWorking = false;

// Mood
let moodHistory = [], currentMood = 'standby', moodFrames = 0;

// Ambient orbs
let ambT = 0;
const ambOrbs = [
  {x:.15,y:.20,r:.55,h:250,s:70,l:52},
  {x:.85,y:.78,r:.48,h:320,s:62,l:50},
  {x:.50,y:.50,r:.38,h:180,s:66,l:54}
];

let toastTimer = null, idleT = 0;

/* ── IndexedDB ────────────────────────────────────────── */
const DB_NAME = 'auraDB_v4';
const openDB = () => new Promise((res,rej) => {
  const r = indexedDB.open(DB_NAME, 1);
  r.onupgradeneeded = e => { const d=e.target.result; if(!d.objectStoreNames.contains('tracks')) d.createObjectStore('tracks',{keyPath:'id'}); };
  r.onsuccess = () => res(r.result);
  r.onerror   = () => rej(r.error);
});
const dbPut    = (db,t)  => new Promise(res => { const tx=db.transaction('tracks','readwrite'); tx.objectStore('tracks').put(t); tx.oncomplete=()=>res(); });
const dbGetAll = db      => new Promise(res => { const tx=db.transaction('tracks','readonly'); const rq=tx.objectStore('tracks').getAll(); rq.onsuccess=()=>res(rq.result||[]); });
const dbDelete = (db,id) => new Promise(res => { const tx=db.transaction('tracks','readwrite'); tx.objectStore('tracks').delete(id); tx.oncomplete=()=>res(); });
const dbClear  = db      => new Promise(res => { const tx=db.transaction('tracks','readwrite'); tx.objectStore('tracks').clear(); tx.oncomplete=()=>res(); });

/* ── Boot ─────────────────────────────────────────────── */
const db = await openDB();
const stored = await dbGetAll(db);
library = stored.map(s => ({...s, url: URL.createObjectURL(s.blob)}));
const savedOrder = JSON.parse(localStorage.getItem('aura:order') || '[]');
if (savedOrder.length) library.sort((a,b) => savedOrder.indexOf(a.id) - savedOrder.indexOf(b.id));
tracks = [...library];

resizeAmbient();
window.addEventListener('resize', resizeAmbient);
setupDragDrop();
setupWaveformInteraction();
document.getElementById('imm-bar-wrap').addEventListener('click', e => {
  if (!audio.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX-r.left)/r.width) * audio.duration;
});
refreshPlaylists();
renderQueue();
restoreSettings();
ambientLoop();
visLoop();

/* ── Ambient Canvas ──────────────────────────────────── */
function resizeAmbient() { ambCv.width=window.innerWidth; ambCv.height=window.innerHeight; }

function ambientLoop() {
  requestAnimationFrame(ambientLoop);
  ambT += .0025;
  const W=ambCv.width, H=ambCv.height;
  ambCtx.clearRect(0,0,W,H);
  for (let i=0;i<ambOrbs.length;i++) {
    const o=ambOrbs[i];
    const ox=o.x*W+Math.sin(ambT+i*1.3)*W*.08, oy=o.y*H+Math.cos(ambT+i*.9)*H*.06;
    const r=o.r*Math.min(W,H);
    const g=ambCtx.createRadialGradient(ox,oy,0,ox,oy,r);
    g.addColorStop(0,`hsla(${o.h},${o.s}%,${o.l}%,.14)`);
    g.addColorStop(.5,`hsla(${o.h},${o.s}%,${o.l}%,.05)`);
    g.addColorStop(1,'transparent');
    ambCtx.beginPath(); ambCtx.arc(ox,oy,r,0,Math.PI*2);
    ambCtx.fillStyle=g; ambCtx.fill();
  }
}

function setAmbientMood(mood) {
  const p={standby:[[250,70,52],[320,62,50],[180,66,54]],calm:[[165,80,55],[200,72,54],[140,76,54]],energetic:[[330,88,60],[20,90,60],[0,82,55]],melancholic:[[220,72,50],[250,66,50],[200,62,54]],euphoric:[[45,95,65],[30,90,60],[60,86,60]]};
  const pal=p[mood]||p.standby;
  for (let i=0;i<pal.length;i++) { ambOrbs[i].h=pal[i][0]; ambOrbs[i].s=pal[i][1]; ambOrbs[i].l=pal[i][2]; }
}

/* ── Circular Visualizer ─────────────────────────────── */
function visLoop() {
  requestAnimationFrame(visLoop);
  const W=visCv.width, H=visCv.height;
  visCtx.clearRect(0,0,W,H);
  if (!audioReady||!isPlaying) { drawIdleRing(W,H); return; }
  analyser.getByteFrequencyData(dataArray);
  const cx=W/2, cy=H/2, artR=88, BARS=120;
  const step=Math.floor(freqBinCount/BARS);
  let bs=0; for(let b=0;b<8;b++) bs+=dataArray[b];
  const bassE=bs/(8*255);
  const mc=cssVar('--mood-accent')||'#7c6aff', mc2=cssVar('--mood-accent2')||'#ff6ab0';
  const g0=visCtx.createRadialGradient(cx,cy,artR,cx,cy,artR+60);
  g0.addColorStop(0,toRgba(mc,.1+bassE*.22)); g0.addColorStop(1,'transparent');
  visCtx.beginPath(); visCtx.arc(cx,cy,artR+60,0,Math.PI*2); visCtx.fillStyle=g0; visCtx.fill();
  for (let i=0;i<BARS;i++) {
    const val=dataArray[i*step]/255, angle=(i/BARS)*Math.PI*2-Math.PI/2;
    const iR=artR+5, bh=val*55+2;
    const x1=cx+Math.cos(angle)*iR, y1=cy+Math.sin(angle)*iR;
    const x2=cx+Math.cos(angle)*(iR+bh), y2=cy+Math.sin(angle)*(iR+bh);
    const frac=i/BARS, col=frac<.25?mc:frac<.6?mc2:'#6affda';
    visCtx.beginPath(); visCtx.moveTo(x1,y1); visCtx.lineTo(x2,y2);
    visCtx.strokeStyle=toRgba(col,.45+val*.55); visCtx.lineWidth=2; visCtx.lineCap='round'; visCtx.stroke();
  }
  const g1=visCtx.createRadialGradient(cx,cy,0,cx,cy,artR);
  g1.addColorStop(0,toRgba(mc,bassE*.18)); g1.addColorStop(1,'transparent');
  visCtx.beginPath(); visCtx.arc(cx,cy,artR,0,Math.PI*2); visCtx.fillStyle=g1; visCtx.fill();
  analyzeMood();
}

function drawIdleRing(W,H) {
  idleT+=.018; const cx=W/2, cy=H/2, r=88+Math.sin(idleT)*4;
  const mc=cssVar('--mood-accent')||'#7c6aff';
  const g=visCtx.createRadialGradient(cx,cy,r-2,cx,cy,r+20);
  g.addColorStop(0,toRgba(mc,.07)); g.addColorStop(1,'transparent');
  visCtx.beginPath(); visCtx.arc(cx,cy,r+20,0,Math.PI*2); visCtx.fillStyle=g; visCtx.fill();
}

/* ── Mood Engine ─────────────────────────────────────── */
function analyzeMood() {
  if (++moodFrames%30!==0) return;
  let bass=0,mid=0,high=0;
  for(let i=0;i<8;i++) bass+=dataArray[i];
  for(let i=8;i<64;i++) mid+=dataArray[i];
  for(let i=64;i<128;i++) high+=dataArray[i];
  bass/=8*255; mid/=56*255; high/=64*255;
  const energy=(bass*2+mid+high*.5)/3.5;
  let mood = energy<.12 ? 'melancholic' : bass>.35&&energy>.3 ? 'energetic' : high>.2&&energy>.25 ? 'euphoric' : 'calm';
  moodHistory.push(mood); if(moodHistory.length>10) moodHistory.shift();
  const counts={};
  for(const m of moodHistory) counts[m]=(counts[m]||0)+1;
  let dominant='calm',best=0;
  for(const k in counts) if(counts[k]>best){best=counts[k];dominant=k;}
  if(dominant!==currentMood) setMood(dominant);
}

const MOODS={standby:{icon:'✦',label:'Standby',cls:''},calm:{icon:'🌊',label:'Calm',cls:'mood-calm'},energetic:{icon:'⚡',label:'Energetic',cls:'mood-energetic'},melancholic:{icon:'🌙',label:'Melancholic',cls:'mood-melancholic'},euphoric:{icon:'✨',label:'Euphoric',cls:'mood-euphoric'}};

function setMood(mood) {
  currentMood=mood; const m=MOODS[mood]||MOODS.standby;
  for(const k in MOODS) if(MOODS[k].cls) document.body.classList.remove(MOODS[k].cls);
  if(m.cls) document.body.classList.add(m.cls);
  document.getElementById('mood-icon').textContent=m.icon;
  document.getElementById('mood-label').textContent=m.label;
  setAmbientMood(mood);
}

/* ── Drag & Drop ─────────────────────────────────────── */
function setupDragDrop() {
  const dz=document.getElementById('drop-zone');
  document.addEventListener('dragover', e=>{e.preventDefault();dz.classList.add('active');});
  document.addEventListener('dragleave', e=>{if(!e.relatedTarget) dz.classList.remove('active');});
  document.addEventListener('drop', e=>{
    e.preventDefault(); dz.classList.remove('active');
    const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('audio/')||/\.(mp3|flac|wav|ogg|m4a|aac)$/i.test(f.name));
    addFiles(files);
  });
}

/* ── File Input ──────────────────────────────────────── */
document.getElementById('file-input').addEventListener('change', e=>{addFiles(Array.from(e.target.files)); e.target.value='';});

async function addFiles(files) {
  if(!files||!files.length) return;
  for(const file of files){
    const id=crypto.randomUUID(), url=URL.createObjectURL(file), name=cleanName(file.name);
    const track={id, name, url, blob:file, file, title:'', artist:'', art:null, duration:null};
    library.push(track); tracks.push(track);
    await dbPut(db,{id, name, blob:file, title:'', artist:'', art:null});
    extractMeta(track).then(async meta=>{
      track.title=meta.title||name; track.artist=meta.artist||''; track.art=meta.art||null; track.name=track.title;
      await dbPut(db,{id, name, blob:file, title:track.title, artist:track.artist, art:track.art});
      if(currentIndex!==-1 && tracks[currentIndex].id===id) updateMetaUI();
      renderQueue();
    });
    extractDuration(track);
  }
  saveOrder(); renderQueue(); refreshPlaylists();
  if(currentIndex===-1 && tracks.length) loadTrack(0, false);
}

function cleanName(fn){return fn.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').replace(/\s+/g,' ').trim();}

/* ── Metadata Extraction ─────────────────────────────── */
function extractMeta(track){
  return new Promise(res=>{
    if(window.jsmediatags){
      jsmediatags.read(track.blob||track.file,{
        onSuccess:tag=>{
          const t=tag.tags, out={};
          if(t.title) out.title=t.title; if(t.artist) out.artist=t.artist;
          if(t.picture){const d=t.picture.data,f=t.picture.format;let b='';for(let i=0;i<d.length;i++)b+=String.fromCharCode(d[i]);out.art=`data:${f};base64,${btoa(b)}`;}
          res(out);
        },
        onError:()=>extractMetaFallback(track).then(res)
      });
    } else extractMetaFallback(track).then(res);
  });
}

function extractMetaFallback(track){
  return (track.blob||track.file).arrayBuffer().then(buf=>{const art=parseID3Art(buf);return art?{art}:{};}).catch(()=>({}));
}

function parseID3Art(buffer){
  try{
    const b=new Uint8Array(buffer);
    if(b[0]!==0x49||b[1]!==0x44||b[2]!==0x33) return null;
    const sz=((b[6]&0x7f)<<21)|((b[7]&0x7f)<<14)|((b[8]&0x7f)<<7)|(b[9]&0x7f);
    let o=10; const end=Math.min(10+sz,b.length);
    while(o<end-10){
      const id=String.fromCharCode(b[o],b[o+1],b[o+2],b[o+3]);
      const fs=(b[o+4]<<24)|(b[o+5]<<16)|(b[o+6]<<8)|b[o+7]; o+=10;
      if(fs<=0||fs>end-o) break;
      if(id==='APIC'){
        let i=o+1; while(i<o+fs&&b[i]!==0)i++;
        const mime=String.fromCharCode.apply(null,b.slice(o+1,i)).toLowerCase();
        i++;i++; while(i<o+fs&&b[i]!==0)i++; i++;
        const img=b.slice(i,o+fs), fmt=mime.indexOf('png')>=0?'image/png':'image/jpeg';
        return 'data:'+fmt+';base64,'+u8b64(img);
      }
      o+=fs;
    }
    return null;
  }catch(e){return null;}
}

function u8b64(bytes){let s='';const chunk=8192;for(let i=0;i<bytes.length;i+=chunk)s+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk));return btoa(s);}

function extractDuration(track){
  const src=track.blob||track.file; if(!src) return;
  src.arrayBuffer().then(buf=>{
    const offCtx=new OfflineAudioContext(1,1,44100);
    return offCtx.decodeAudioData(buf.slice(0)).then(decoded=>{
      track.duration=decoded.duration;
      const el=document.querySelector(`.track-item[data-idx="${tracks.indexOf(track)}"] .track-dur`);
      if(el) el.textContent=fmt(decoded.duration);
    });
  }).catch(()=>{});
}

/* ── Track Loading ───────────────────────────────────── */
async function loadTrack(index, autoplay=false){
  if(index<0||index>=tracks.length) return;
  currentIndex=index; const t=tracks[index];
  audio.src=t.url; audio.playbackRate=speeds[speedIdx]; audio.load();
  waveformData=null; clearWaveformCanvas(); buildWaveform(t);
  updateMetaUI(); updateAllArt(); updateLikeBtn(); renderQueue(); showToast(); applyTheme(t.art);
  localStorage.setItem('aura:lastIdx', index);
  if(autoplay||isPlaying){
    try{await audio.play(); isPlaying=true; ensureAudioCtx();}catch(e){isPlaying=false;}
    updatePlayUI();
  } else { updatePlayUI(); }
  if('mediaSession' in navigator){
    const title=t.title||t.name, artist=t.artist||'Unknown';
    navigator.mediaSession.metadata=new MediaMetadata({title,artist,artwork:t.art?[{src:t.art}]:[]});
    navigator.mediaSession.setActionHandler('play',togglePlay);
    navigator.mediaSession.setActionHandler('pause',togglePlay);
    navigator.mediaSession.setActionHandler('previoustrack',prevTrack);
    navigator.mediaSession.setActionHandler('nexttrack',nextTrack);
  }
}

/* ── Audio Context ───────────────────────────────────── */
function ensureAudioCtx(){
  if(!audioReady){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser(); analyser.fftSize=2048; analyser.smoothingTimeConstant=.83;
    freqBinCount=analyser.frequencyBinCount; dataArray=new Uint8Array(freqBinCount);
    gainNode=audioCtx.createGain(); mediaSrc=audioCtx.createMediaElementSource(audio);
    mediaSrc.connect(gainNode); gainNode.connect(analyser); analyser.connect(audioCtx.destination);
    audioReady=true;
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
}

/* ── Waveform ────────────────────────────────────────── */
function buildWaveform(track){
  if(wfWorking) return; wfWorking=true;
  document.getElementById('wf-loading').classList.add('show');
  const src=track.blob||track.file; if(!src){wfWorking=false;document.getElementById('wf-loading').classList.remove('show');return;}
  src.arrayBuffer().then(buf=>{
    const offCtx=new OfflineAudioContext(1,1,44100);
    return offCtx.decodeAudioData(buf.slice(0)).then(decoded=>{
      const raw=decoded.getChannelData(0), PTS=220, block=Math.floor(raw.length/PTS);
      const data=new Float32Array(PTS);
      for(let i=0;i<PTS;i++){let sum=0;for(let j=0;j<block;j++)sum+=Math.abs(raw[i*block+j]);data[i]=sum/block;}
      let max=0; for(let i=0;i<data.length;i++) if(data[i]>max) max=data[i];
      if(max>0) for(let i=0;i<data.length;i++) data[i]/=max;
      waveformData=data; track.duration=decoded.duration;
      document.getElementById('time-total').textContent=fmt(decoded.duration);
      const el=document.querySelector(`.track-item[data-idx="${currentIndex}"] .track-dur`);
      if(el) el.textContent=fmt(decoded.duration);
      paintWaveform(0);
    });
  }).catch(()=>paintFlatWaveform())
  .finally(()=>{wfWorking=false;document.getElementById('wf-loading').classList.remove('show');});
}

function paintWaveform(progress){
  const dpr=window.devicePixelRatio||1, W=wfCv.offsetWidth*dpr, H=46*dpr;
  wfCv.width=W; wfCv.height=H; wfCtx.clearRect(0,0,W,H);
  if(!waveformData){paintFlatWaveform();return;}
  const mc=cssVar('--mood-accent')||'#7c6aff', mc2=cssVar('--mood-accent2')||'#ff6ab0';
  const PTS=waveformData.length, bw=W/PTS, midY=H/2;
  for(let i=0;i<PTS;i++){
    const x=i*bw, h=waveformData[i]*midY*.88+1, played=(i/PTS)<=progress;
    if(played){const g=wfCtx.createLinearGradient(0,midY-h,0,midY+h);g.addColorStop(0,toRgba(mc,.92));g.addColorStop(1,toRgba(mc2,.72));wfCtx.fillStyle=g;}
    else wfCtx.fillStyle='rgba(255,255,255,0.09)';
    const bw2=Math.max(1,bw-1); wfCtx.fillRect(x,midY-h,bw2,h); wfCtx.fillRect(x,midY,bw2,h);
  }
  const px=progress*W;
  wfCtx.beginPath(); wfCtx.moveTo(px,3); wfCtx.lineTo(px,H-3);
  wfCtx.strokeStyle='rgba(255,255,255,0.75)'; wfCtx.lineWidth=2*dpr; wfCtx.stroke();
}

function paintFlatWaveform(){
  const dpr=window.devicePixelRatio||1, W=wfCv.offsetWidth*dpr||400, H=46*dpr;
  wfCv.width=W; wfCv.height=H;
  wfCtx.fillStyle='rgba(255,255,255,0.06)'; wfCtx.fillRect(0,H/2-1,W,2);
}

function clearWaveformCanvas(){paintFlatWaveform();}

function setupWaveformInteraction(){
  wfCv.addEventListener('click',e=>{
    if(!audio.duration) return;
    const r=wfCv.getBoundingClientRect();
    audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
  });
  wfCv.addEventListener('mousemove',e=>{
    if(!waveformData||!audio.duration) return;
    const r=wfCv.getBoundingClientRect(), ratio=(e.clientX-r.left)/r.width;
    paintWaveform(audio.currentTime/audio.duration);
    const dpr=window.devicePixelRatio||1;
    wfCtx.beginPath(); wfCtx.moveTo(ratio*wfCv.width,3); wfCtx.lineTo(ratio*wfCv.width,wfCv.height-3);
    wfCtx.strokeStyle='rgba(255,255,255,0.28)'; wfCtx.lineWidth=1.5*dpr;
    wfCtx.setLineDash([4*dpr,4*dpr]); wfCtx.stroke(); wfCtx.setLineDash([]);
  });
  wfCv.addEventListener('mouseleave',()=>{if(audio.duration) paintWaveform(audio.currentTime/audio.duration);});
}

/* ── Audio Events ────────────────────────────────────── */
audio.addEventListener('play',  ()=>{isPlaying=true;  updatePlayUI(); ensureAudioCtx();});
audio.addEventListener('pause', ()=>{isPlaying=false; updatePlayUI();});
audio.addEventListener('ended', ()=>{if(repeat){audio.currentTime=0;audio.play();return;}nextTrack();});
audio.addEventListener('timeupdate',()=>{
  const cur=audio.currentTime, dur=audio.duration||0, pct=dur?cur/dur:0;
  document.getElementById('time-current').textContent=fmt(cur);
  document.getElementById('time-total').textContent=fmt(dur);
  document.getElementById('imm-current').textContent=fmt(cur);
  document.getElementById('imm-total').textContent=fmt(dur);
  document.getElementById('imm-bar-fill').style.width=(pct*100)+'%';
  document.getElementById('mini-progress').style.transform='scaleX('+pct+')';
  if(waveformData) paintWaveform(pct);
  if(Date.now()%5000<250) localStorage.setItem('aura:lastTime',audio.currentTime);
});

/* ── Playback Controls ───────────────────────────────── */
function togglePlay(){
  if(!tracks.length) return;
  if(currentIndex===-1){loadTrack(0,true);return;}
  if(isPlaying) audio.pause();
  else{ensureAudioCtx();audio.play().catch(()=>{});}
}

function nextTrack(){
  if(!tracks.length) return;
  let next;
  if(shuffle){const opts=tracks.map((_,i)=>i).filter(i=>i!==currentIndex);next=opts.length?opts[Math.floor(Math.random()*opts.length)]:currentIndex;}
  else next=(currentIndex+1)%tracks.length;
  loadTrack(next,true);
}

function prevTrack(){
  if(!tracks.length) return;
  if(audio.currentTime>3){audio.currentTime=0;return;}
  loadTrack((currentIndex-1+tracks.length)%tracks.length,true);
}

function toggleShuffle(){shuffle=!shuffle;document.getElementById('btn-shuffle').classList.toggle('active',shuffle);localStorage.setItem('aura:shuffle',shuffle);}
function toggleRepeat() {repeat=!repeat;  document.getElementById('btn-repeat').classList.toggle('active',repeat);  localStorage.setItem('aura:repeat',repeat);}
function setVolume(v)   {audio.volume=parseFloat(v);document.getElementById('vol-fill').style.width=(v*100)+'%';localStorage.setItem('aura:vol',v);}
function cycleSpeed()   {speedIdx=(speedIdx+1)%speeds.length;audio.playbackRate=speeds[speedIdx];document.getElementById('speed-btn').textContent=speeds[speedIdx]+'×';}

function toggleLike(){
  if(currentIndex<0) return;
  const key=tracks[currentIndex].id;
  if(likedTracks.has(key)) likedTracks.delete(key); else likedTracks.add(key);
  localStorage.setItem('aura:likes',JSON.stringify([...likedTracks]));
  updateLikeBtn();
}

function updateLikeBtn(){
  const liked=currentIndex>=0&&likedTracks.has(tracks[currentIndex]?.id);
  const btn=document.getElementById('like-btn');
  btn.textContent=liked?'♥':'♡'; btn.classList.toggle('liked',liked);
}

function toggleImmersive(){immersiveOpen=!immersiveOpen;document.getElementById('immersive-overlay').classList.toggle('active',immersiveOpen);}
function toggleMini()    {document.body.classList.toggle('mini-mode');}

/* ── Queue Rendering ─────────────────────────────────── */
function renderQueue(){
  const list=document.getElementById('queue-list'), n=tracks.length;
  document.getElementById('track-count').textContent=n+' track'+(n!==1?'s':'');
  if(!n){list.innerHTML='<div class="queue-empty"><div class="emp-icon">🎵</div><p>Drop <strong>MP3 / FLAC / WAV</strong> files<br>or click <strong>Add Music</strong></p></div>';return;}
  const q=searchQuery.toLowerCase();
  const filtered=tracks.map((t,i)=>({t,i})).filter(({t})=>!q||t.name.toLowerCase().includes(q)||(t.artist||'').toLowerCase().includes(q));
  if(!filtered.length){list.innerHTML='<div class="queue-empty"><div class="emp-icon">🔍</div><p>No results for "<strong>'+searchQuery+'</strong>"</p></div>';return;}
  list.innerHTML='';
  for(const {t,i} of filtered){
    const div=document.createElement('div');
    div.className='track-item'+(i===currentIndex?' active':'');
    div.setAttribute('data-idx',i); div.draggable=true;
    const thumb=t.art?`<img src="${t.art}" alt="">`:'<span>🎵</span>';
    const playing=i===currentIndex&&isPlaying;
    div.innerHTML=
      `<div class="track-num">${i+1}</div>`+
      `<div class="now-eq"><div class="eq-mini${playing?'':' paused'}"></div><div class="eq-mini${playing?'':' paused'}"></div><div class="eq-mini${playing?'':' paused'}"></div></div>`+
      `<div class="track-thumb">${thumb}<div class="hover-play">${playing?'⏸':'▶'}</div></div>`+
      `<div class="track-info">`+
        `<div class="track-name">${hlText(t.name||'?',q)}</div>`+
        `<div class="track-sub">${t.artist||'Local file'}</div>`+
        `<div class="track-dur" style="font-size:10px;color:var(--text3);margin-top:1px" id="dur-${i}">${t.duration?fmt(t.duration):'–'}</div>`+
      `</div>`+
      `<div class="track-remove" title="Remove">✕</div>`;
    div.querySelector('.track-remove').addEventListener('click',e=>{e.stopPropagation();removeTrack(i);});
    div.addEventListener('click',()=>i===currentIndex?togglePlay():loadTrack(i,true));
    div.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',i);div.classList.add('dragging');});
    div.addEventListener('dragend',()=>div.classList.remove('dragging'));
    div.addEventListener('dragover',e=>{e.preventDefault();div.classList.add('drag-over');});
    div.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
    div.addEventListener('drop',e=>{e.preventDefault();div.classList.remove('drag-over');const from=parseInt(e.dataTransfer.getData('text/plain'));if(from!==i)reorderTrack(from,i);});
    list.appendChild(div);
  }
}

function hlText(text,q){
  if(!q) return text;
  const esc=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp('('+esc+')','gi'),'<mark style="background:rgba(124,106,255,.28);color:inherit;border-radius:2px;padding:0 1px">$1</mark>');
}

function removeTrack(idx){
  URL.revokeObjectURL(tracks[idx].url); dbDelete(db,tracks[idx].id);
  const li=library.indexOf(tracks[idx]); if(li>=0) library.splice(li,1);
  tracks.splice(idx,1);
  if(idx===currentIndex){
    if(tracks.length) loadTrack(Math.min(idx,tracks.length-1),isPlaying);
    else{audio.pause();audio.src='';isPlaying=false;currentIndex=-1;updatePlayUI();resetUI();}
  } else if(currentIndex>idx) currentIndex--;
  saveOrder(); renderQueue();
}

function reorderTrack(from,to){
  const moved=tracks.splice(from,1)[0]; tracks.splice(to,0,moved);
  if(currentIndex===from) currentIndex=to;
  else if(currentIndex>from&&currentIndex<=to) currentIndex--;
  else if(currentIndex<from&&currentIndex>=to) currentIndex++;
  saveOrder(); renderQueue();
}

function clearAll(){
  if(!tracks.length) return;
  audio.pause(); audio.src=''; isPlaying=false; currentIndex=-1;
  for(const t of tracks) URL.revokeObjectURL(t.url);
  tracks=[]; library=[]; waveformData=null;
  dbClear(db); localStorage.removeItem('aura:order');
  updatePlayUI(); renderQueue(); resetUI();
}

function filterQueue(q){searchQuery=q;renderQueue();}
function saveOrder(){localStorage.setItem('aura:order',JSON.stringify(tracks.map(t=>t.id)));}

/* ── Playlists ───────────────────────────────────────── */
function savePlaylist(){
  const name=prompt('Playlist name:'); if(!name) return;
  const pls=JSON.parse(localStorage.getItem('aura:playlists')||'{}');
  pls[name]=tracks.map(t=>t.id);
  localStorage.setItem('aura:playlists',JSON.stringify(pls));
  refreshPlaylists(); document.getElementById('playlist-select').value=name;
}

function loadPlaylist(name){
  if(name==='Library'||!name){tracks=[...library];renderQueue();return;}
  const pls=JSON.parse(localStorage.getItem('aura:playlists')||'{}');
  const ids=pls[name]||[];
  tracks=ids.map(id=>library.find(t=>t.id===id)).filter(Boolean);
  currentIndex=-1; renderQueue();
}

function refreshPlaylists(){
  const sel=document.getElementById('playlist-select'); sel.innerHTML='';
  const lib=document.createElement('option'); lib.value='Library'; lib.textContent='Library'; sel.appendChild(lib);
  const pls=JSON.parse(localStorage.getItem('aura:playlists')||'{}');
  for(const n of Object.keys(pls)){const o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);}
}
document.getElementById('playlist-select').addEventListener('change',e=>loadPlaylist(e.target.value));

/* ── UI Updates ──────────────────────────────────────── */
function updateMetaUI(){
  const t=tracks[currentIndex]; if(!t) return;
  const title=t.title||t.name||'?', artist=t.artist||'Local file';
  document.getElementById('now-title').textContent=title;
  document.getElementById('now-artist').textContent=artist;
  document.getElementById('mini-title').textContent=title;
  document.getElementById('mini-artist').textContent=artist;
  document.getElementById('imm-title').textContent=title;
  document.getElementById('imm-artist').textContent=artist;
  document.getElementById('toast-title').textContent=title;
  document.getElementById('toast-artist').textContent=artist;
  document.getElementById('now-title').classList.toggle('marquee',title.length>24);
}

function updateAllArt(){
  if(currentIndex<0) return;
  const t=tracks[currentIndex], hasArt=!!t.art;
  const pairs=[['art-img','art-emoji'],['mini-img','mini-emoji'],['imm-img','imm-emoji'],['toast-img','toast-emoji']];
  for(const [imgId,emoId] of pairs){
    const img=document.getElementById(imgId), em=document.getElementById(emoId);
    if(hasArt){img.src=t.art;img.style.display='block';if(em)em.style.display='none';}
    else{img.src='';img.style.display='none';if(em)em.style.display='';}
  }
  document.getElementById('imm-blur').style.backgroundImage=hasArt?`url(${t.art})`:'none';
}

function updatePlayUI(){
  const play='<polygon points="5 3 19 12 5 21 5 3"/>';
  const pause='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  const ico=isPlaying?pause:play;
  document.getElementById('play-icon').innerHTML=ico;
  document.getElementById('imm-play-icon').innerHTML=ico;
  document.getElementById('album-art').classList.toggle('playing',isPlaying);
  document.getElementById('eq-dots').classList.toggle('paused',!isPlaying);
  document.querySelectorAll('.eq-mini').forEach(m=>m.classList.toggle('paused',!isPlaying));
}

function resetUI(){
  ['now-title','imm-title','toast-title'].forEach(id=>document.getElementById(id).textContent=id==='now-title'?'No track selected':'–');
  document.getElementById('now-artist').textContent='Add music to get started';
  document.getElementById('mini-title').textContent='No track';
  document.getElementById('mini-artist').textContent='–';
  ['imm-artist','toast-artist'].forEach(id=>document.getElementById(id).textContent='–');
  ['time-current','time-total','imm-current','imm-total'].forEach(id=>document.getElementById(id).textContent='0:00');
  document.getElementById('mini-progress').style.transform='scaleX(0)';
  document.getElementById('imm-bar-fill').style.width='0%';
  document.getElementById('like-btn').textContent='♡';
  document.getElementById('like-btn').classList.remove('liked');
  ['art-img','mini-img','imm-img','toast-img'].forEach(id=>{const el=document.getElementById(id);el.src='';el.style.display='none';});
  ['art-emoji','mini-emoji','imm-emoji','toast-emoji'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='';});
  document.getElementById('imm-blur').style.backgroundImage='none';
  clearWaveformCanvas(); setMood('standby');
}

/* ── Album Art Theme Extraction ──────────────────────── */
function applyTheme(art){
  if(!art||currentMood!=='standby') return;
  const img=new Image(); img.src=art;
  img.onload=()=>{
    const c=document.createElement('canvas'); c.width=c.height=24;
    const x=c.getContext('2d',{willReadFrequently:true});
    x.drawImage(img,0,0,24,24);
    const d=x.getImageData(0,0,24,24).data;
    let r=0,g=0,b=0,n=0;
    for(let i=0;i<d.length;i+=16){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}
    r=r/n|0; g=g/n|0; b=b/n|0;
    document.documentElement.style.setProperty('--mood-accent', `rgb(${r},${g},${b})`);
    document.documentElement.style.setProperty('--mood-accent2',`rgb(${Math.min(255,r+40)},${Math.min(255,g+20)},${Math.min(255,b+70)})`);
    document.documentElement.style.setProperty('--mood-glow',   `rgba(${r},${g},${b},.22)`);
  };
}

/* ── Toast ───────────────────────────────────────────── */
function showToast(){
  clearTimeout(toastTimer);
  const el=document.getElementById('toast'); el.classList.add('show');
  toastTimer=setTimeout(()=>el.classList.remove('show'),3800);
}

/* ── Keyboard Shortcuts ──────────────────────────────── */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  switch(e.code){
    case 'Space':      e.preventDefault(); togglePlay(); break;
    case 'ArrowRight':
      if(e.shiftKey||e.metaKey||e.ctrlKey) nextTrack();
      else if(audio.duration) audio.currentTime=Math.min(audio.duration,audio.currentTime+5);
      break;
    case 'ArrowLeft':
      if(e.shiftKey||e.metaKey||e.ctrlKey) prevTrack();
      else audio.currentTime=Math.max(0,audio.currentTime-5);
      break;
    case 'ArrowUp':{const v=Math.min(1,audio.volume+.05);audio.volume=v;document.getElementById('volume').value=v;document.getElementById('vol-fill').style.width=(v*100)+'%';break;}
    case 'ArrowDown':{const v=Math.max(0,audio.volume-.05);audio.volume=v;document.getElementById('volume').value=v;document.getElementById('vol-fill').style.width=(v*100)+'%';break;}
    case 'KeyI': toggleImmersive(); break;
    case 'KeyS': toggleShuffle();   break;
    case 'KeyR': toggleRepeat();    break;
    case 'KeyL': toggleLike();      break;
    case 'KeyM': toggleMini();      break;
    case 'Escape': if(immersiveOpen) toggleImmersive(); break;
  }
});

/* ── Restore Settings ────────────────────────────────── */
function restoreSettings(){
  const vol=parseFloat(localStorage.getItem('aura:vol')||'1');
  audio.volume=vol; document.getElementById('volume').value=vol;
  document.getElementById('vol-fill').style.width=(vol*100)+'%';
  shuffle=localStorage.getItem('aura:shuffle')==='true';
  repeat =localStorage.getItem('aura:repeat') ==='true';
  document.getElementById('btn-shuffle').classList.toggle('active',shuffle);
  document.getElementById('btn-repeat').classList.toggle('active',repeat);
  renderQueue();
  const lastIdx=parseInt(localStorage.getItem('aura:lastIdx')||'-1');
  if(lastIdx>=0&&tracks[lastIdx]){
    loadTrack(lastIdx,false).then(()=>{
      const t=parseFloat(localStorage.getItem('aura:lastTime')||'0');
      if(t) audio.currentTime=t;
    });
  }
}

window.addEventListener('beforeunload',()=>{
  localStorage.setItem('aura:lastIdx',currentIndex);
  localStorage.setItem('aura:lastTime',audio.currentTime);
});

/* ── Helpers ─────────────────────────────────────────── */
function fmt(s){if(!s||isNaN(s))return'0:00';return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}

function cssVar(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim();}

function toRgba(hex,alpha){
  if(!hex) return`rgba(124,106,255,${alpha})`;
  hex=hex.trim();
  if(hex.startsWith('rgb')){const n=hex.match(/[\d.]+/g);if(n&&n.length>=3)return`rgba(${n[0]},${n[1]},${n[2]},${alpha})`;}
  if(hex.charAt(0)!=='#') return`rgba(124,106,255,${alpha})`;
  const r=parseInt(hex.slice(1,3),16)||124, g=parseInt(hex.slice(3,5),16)||106, b=parseInt(hex.slice(5,7),16)||255;
  return`rgba(${r},${g},${b},${alpha})`;
}
